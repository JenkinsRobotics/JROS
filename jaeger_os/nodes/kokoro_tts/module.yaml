module: kokoro_tts
slot: tts
version: 1.0.0
consumes: [/act/speech, /act/speech_stop]
produces: [/sense/spoken, /sense/tts_chunk]
tools: [text_to_speech]
factory: jaeger_os.nodes.kokoro_tts:make_tts_node
config: kokoro_tts        # its group/key in the settings catalog
# Carried over from the old plugin.yaml's `requires.libraries` block
# (pre-0.8 M1, jaeger_os/plugins/kokoro_tts/plugin.yaml) — the
# libraries the engine actually imports at runtime. The availability
# gate (jaeger_os/agent/availability.py) probes these with
# importlib.util.find_spec before reporting text_to_speech available.
requires_libraries: [kokoro, sounddevice, numpy]
